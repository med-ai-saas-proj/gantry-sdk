openapi: 3.1.0
info:
  title: gantry
  version: 0.1.0
servers:
- url: /
paths:
  /ready:
    get:
      operationId: ready_ready_get
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Ready
  /billing/:
    post:
      operationId: post_billing__post
      parameters:
      - explode: false
        in: header
        name: idempotency-key
        required: false
        schema:
          nullable: true
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                format: uuid
                title: Response Post Billing  Post
                type: string
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Post
      tags:
      - billing
      - internal
  /billing/{transaction_uid}/capture:
    post:
      operationId: capture_billing__transaction_uid__capture_post
      parameters:
      - explode: false
        in: path
        name: transaction_uid
        required: true
        schema:
          format: uuid
          title: Transaction Uid
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaptureRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                title: Response Capture Billing  Transaction Uid  Capture Post
                type: boolean
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Capture
      tags:
      - billing
      - internal
  /ai-gateway/models:
    get:
      operationId: get_models_ai_gateway_models_get
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                title: Response Get Models Ai Gateway Models Get
                type: array
          description: Successful Response
      summary: Get Models
      tags:
      - ai-gateway
  /ai-gateway/ag-ui/{model}:
    post:
      operationId: ag_ui_gateway_ai_gateway_ag_ui__model__post
      parameters:
      - explode: false
        in: path
        name: model
        required: true
        schema:
          title: Model
          type: string
        style: simple
      - explode: true
        in: query
        name: project_id
        required: true
        schema:
          format: uuid
          title: Project Id
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunAgentInputWithModelSettings"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Ag_Ui_Gateway_Ai_Gateway_Ag_Ui__Model__Post"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Ag Ui Gateway
      tags:
      - ai-gateway
  /rag/files:
    get:
      description: Endpoint to list distinct file ids stored in a RAG.
      operationId: get_files_rag_files_get
      parameters:
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FileInfoResponse"
                title: Response Get Files Rag Files Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List files in a RAG.
      tags:
      - rag
    post:
      description: Endpoint to add a new file to a RAG.
      operationId: add_file_rag_files_post
      parameters:
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRagFileRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                title: Response Add File Rag Files Post
                type: string
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Add a file to a RAG.
      tags:
      - rag
  /rag/text:
    post:
      description: Endpoint to add new text (without an associated file) to a RAG.
        The text will be chunked and embedded asynchronously.
      operationId: add_text_rag_text_post
      parameters:
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTextToRagRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                title: Response Add Text Rag Text Post
                type: string
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Add text to a RAG.
      tags:
      - rag
  /rag/files/{task_id}:
    get:
      description: Endpoint to get the status of an asynchronous RAG file embedding
        task.
      operationId: get_task_status_rag_files__task_id__get
      parameters:
      - explode: false
        in: path
        name: task_id
        required: true
        schema:
          title: Task Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingTaskResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get RAG file embedding task status.
      tags:
      - rag
  /rag/query/text:
    post:
      description: Endpoint to run a similarity search against a RAG by text. The
        service will generate an embedding for the query text and then run the similarity
        search.
      operationId: query_similar_by_text_rag_query_text_post
      parameters:
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      - description: "Whether to include embeddings in the response. Embeddings can\
          \ be large, so they are excluded by default."
        explode: true
        in: query
        name: include_embedding
        required: false
        schema:
          default: false
          description: "Whether to include embeddings in the response. Embeddings\
            \ can be large, so they are excluded by default."
          title: Include Embedding
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRagQueryByTextRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/RagQueryResponse"
                title: Response Query Similar By Text Rag Query Text Post
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Query a RAG by text.
      tags:
      - rag
  /file-storage/:
    get:
      description: Endpoint to list files in the file storage service.
      operationId: list_files_file_storage__get
      parameters:
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/FileInfoResponse"
                title: Response List Files File Storage  Get
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List files in the file storage service.
      tags:
      - file-storage
    post:
      description: Endpoint to upload a file to the file storage service.
      operationId: upload_file_file_storage__post
      parameters:
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/Body_upload_file_file_storage__post"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Upload a file to the file storage service.
      tags:
      - file-storage
  /file-storage/{file_id}/download:
    get:
      description: Endpoint to download a file by its file ID.
      operationId: download_file_file_storage__file_id__download_get
      parameters:
      - explode: false
        in: path
        name: file_id
        required: true
        schema:
          format: uuid
          title: File Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "302":
          description: Redirect to object storage presigned URL for file download.
          headers:
            Location:
              description: The URL to redirect to
              explode: false
              schema:
                format: uri
                type: string
              style: simple
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Download a file by file ID.
      tags:
      - file-storage
  /file-storage/{file_id}:
    delete:
      description: Endpoint to delete a file from storage by its file ID.
      operationId: delete_file_file_storage__file_id__delete
      parameters:
      - explode: false
        in: path
        name: file_id
        required: true
        schema:
          format: uuid
          title: File Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Delete a file by file ID.
      tags:
      - file-storage
    get:
      description: Endpoint to retrieve file info and a presigned URL for downloading
        the file by file ID.
      operationId: get_file_info_and_presigned_url_file_storage__file_id__get
      parameters:
      - explode: false
        in: path
        name: file_id
        required: true
        schema:
          format: uuid
          title: File Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfoWithPresignedURLResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get file info and presigned URL by file ID.
      tags:
      - file-storage
  /file-storage/{file_id}/info:
    get:
      description: Endpoint to retrieve file info by file ID.
      operationId: get_file_info_file_storage__file_id__info_get
      parameters:
      - explode: false
        in: path
        name: file_id
        required: true
        schema:
          format: uuid
          title: File Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfoResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get file info by file ID.
      tags:
      - file-storage
  /file-storage/{file_id}/presigned-url:
    get:
      description: Endpoint to generate a presigned URL for downloading the file.
      operationId: get_file_presigned_url_file_storage__file_id__presigned_url_get
      parameters:
      - explode: false
        in: path
        name: file_id
        required: true
        schema:
          format: uuid
          title: File Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilePresignedURLResponse"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get presigned URL for file download.
      tags:
      - file-storage
  /file-storage/{file_id}/metadata:
    put:
      description: Endpoint to update file metadata by file ID.
      operationId: update_file_metadata_file_storage__file_id__metadata_put
      parameters:
      - explode: false
        in: path
        name: file_id
        required: true
        schema:
          format: uuid
          title: File Id
          type: string
        style: simple
      - explode: true
        in: query
        name: project_uuid
        required: true
        schema:
          format: uuid
          title: Project Uuid
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFileMetadataRequest"
        required: true
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Update file metadata by file ID.
      tags:
      - file-storage
components:
  schemas:
    ActivityDeltaEvent:
      additionalProperties: true
      description: Event containing a JSON Patch delta for an activity message.
      properties:
        type:
          default: ACTIVITY_DELTA
          enum:
          - ACTIVITY_DELTA
          title: Type
          type: string
        timestamp:
          nullable: true
          type: integer
        rawEvent:
          anyOf: []
          nullable: true
          title: Rawevent
        messageId:
          title: Messageid
          type: string
        activityType:
          title: Activitytype
          type: string
        patch:
          items: {}
          title: Patch
          type: array
      required:
      - activityType
      - messageId
      - patch
      title: ActivityDeltaEvent
    ActivityMessage:
      additionalProperties: {}
      description: An activity progress message emitted between chat messages.
      properties:
        id:
          title: Id
          type: string
        role:
          default: activity
          enum:
          - activity
          title: Role
          type: string
        activityType:
          title: Activitytype
          type: string
        content:
          additionalProperties: true
          title: Content
          type: object
      required:
      - activityType
      - content
      - id
      title: ActivityMessage
    ActivitySnapshotEvent:
      additionalProperties: true
      description: Event containing a snapshot of an activity message.
      properties:
        type:
          default: ACTIVITY_SNAPSHOT
          enum:
          - ACTIVITY_SNAPSHOT
          title: Type
          type: string
        timestamp:
          nullable: true
          type: integer
        rawEvent:
          anyOf: []
          nullable: true
          title: Rawevent
        messageId:
          title: Messageid
          type: string
        activityType:
          title: Activitytype
          type: string
        content:
          title: Content
        replace:
          default: true
          title: Replace
          type: boolean
      required:
      - activityType
      - content
      - messageId
      title: ActivitySnapshotEvent
    AddRagFileRequest:
      description: DTO for adding a file (with embedding) to a RAG bucket.
      example:
        file_uid: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        chunk_size: 0
        lang: simple
        chunk_overlap: 0
        chunk_splitter: ""
        chunk_splitter_options:
          chunk_size: 0
          keep_separator: true
          is_separator_regex: true
          chunk_overlap: 6
          separator: separator
      properties:
        file_uid:
          format: uuid
          title: File Uid
          type: string
        lang:
          default: simple
          title: Lang
          type: string
        chunk_splitter:
          allOf:
          - $ref: "#/components/schemas/ChunkSplitterType"
          default: recursive
        chunk_splitter_options:
          $ref: "#/components/schemas/Chunk_Splitter_Options"
        chunk_size:
          default: 1000
          exclusiveMinimum: true
          minimum: 0.0
          title: Chunk Size
          type: integer
        chunk_overlap:
          default: 150
          minimum: 0.0
          title: Chunk Overlap
          type: integer
      required:
      - file_uid
      title: AddRagFileRequest
    AddTextToRagRequest:
      description: DTO for adding text (with embedding) to a RAG bucket without an
        associated file. This can be used for ad-hoc knowledge that doesn't come from
        a file.
      example:
        chunk_size: 0
        metadata:
          key: ""
        text: Text
        lang: simple
        chunk_overlap: 0
        chunk_splitter: ""
        chunk_splitter_options:
          chunk_size: 0
          keep_separator: true
          is_separator_regex: true
          chunk_overlap: 6
          separator: separator
      properties:
        text:
          $ref: "#/components/schemas/Text"
        lang:
          default: simple
          title: Lang
          type: string
        chunk_splitter:
          allOf:
          - $ref: "#/components/schemas/ChunkSplitterType"
          default: recursive
        chunk_splitter_options:
          $ref: "#/components/schemas/Chunk_Splitter_Options"
        chunk_size:
          default: 1000
          exclusiveMinimum: true
          minimum: 0.0
          title: Chunk Size
          type: integer
        chunk_overlap:
          default: 150
          minimum: 0.0
          title: Chunk Overlap
          type: integer
        metadata:
          additionalProperties: true
          nullable: true
          type: object
      required:
      - text
      title: AddTextToRagRequest
    AssistantMessage:
      additionalProperties: true
      description: An assistant message.
      properties:
        id:
          title: Id
          type: string
        role:
          default: assistant
          enum:
          - assistant
          title: Role
          type: string
        content:
          nullable: true
          type: string
        name:
          nullable: true
          type: string
        encryptedValue:
          nullable: true
          type: string
        toolCalls:
          items:
            $ref: "#/components/schemas/ToolCall"
          nullable: true
          type: array
      required:
      - id
      title: AssistantMessage
    AudioInputContent:
      additionalProperties: true
      description: An audio input content fragment.
      properties:
        type:
          default: audio
          enum:
          - audio
          title: Type
          type: string
        source:
          $ref: "#/components/schemas/Source"
        metadata:
          anyOf: []
          nullable: true
          title: Metadata
      required:
      - source
      title: AudioInputContent
    BinaryInputContent:
      additionalProperties: true
      description: A deprecated binary payload reference in a multimodal user message.
      properties:
        type:
          default: binary
          enum:
          - binary
          title: Type
          type: string
        mimeType:
          title: Mimetype
          type: string
        id:
          nullable: true
          type: string
        url:
          nullable: true
          type: string
        data:
          nullable: true
          type: string
        filename:
          nullable: true
          type: string
      required:
      - mimeType
      title: BinaryInputContent
    Body_upload_file_file_storage__post:
      properties:
        file:
          title: File
          type: string
      required:
      - file
      title: Body_upload_file_file_storage__post
    CaptureRequest:
      example:
        real_amount:
          scale: 6
          value: 0
      properties:
        real_amount:
          $ref: "#/components/schemas/ScaledAmount"
      required:
      - real_amount
      title: CaptureRequest
    CharacterTextSplitterOptions:
      example:
        chunk_size: 0
        keep_separator: true
        is_separator_regex: true
        chunk_overlap: 6
        separator: separator
      properties:
        separator:
          title: Separator
          type: string
        is_separator_regex:
          title: Is Separator Regex
          type: boolean
        chunk_size:
          title: Chunk Size
          type: integer
        chunk_overlap:
          title: Chunk Overlap
          type: integer
        keep_separator:
          $ref: "#/components/schemas/Keep_Separator"
      title: CharacterTextSplitterOptions
    ChunkSplitterType:
      enum:
      - simple
      - character
      - recursive
      - token
      - markdown
      - markdown_header
      - html
      - html_header
      - html_semantic_preserving
      - html_section
      - recursive_json
      - experimental_markdown_syntax
      - code_language_c
      - code_language_cobol
      - code_language_cpp
      - code_language_csharp
      - code_language_go
      - code_language_haskell
      - code_language_html
      - code_language_java
      - code_language_jsx
      - code_language_kotlin
      - code_language_latex
      - code_language_lua
      - code_language_markdown
      - code_language_perl
      - code_language_php
      - code_language_proto
      - code_language_python
      - code_language_rst
      - code_language_ruby
      - code_language_rust
      - code_language_scala
      - code_language_sol
      - code_language_swift
      - code_language_ts
      - code_language_js
      - latex
      - nltk
      - spacy
      - konlpy
      - sentence_transformers_token
      - paragraph
      - line
      title: ChunkSplitterType
      type: string
    Context:
      additionalProperties: true
      description: Additional context for the agent.
      example:
        description: description
        value: value
      properties:
        description:
          title: Description
          type: string
        value:
          title: Value
          type: string
      required:
      - description
      - value
      title: Context
    CustomEvent:
      additionalProperties: true
      description: Event containing a custom event.
      properties:
        type:
          default: CUSTOM
          enum:
          - CUSTOM
          title: Type
          type: string
        timestamp:
          nullable: true
          type: integer
        rawEvent:
          anyOf: []
          nullable: true
          title: Rawevent
        name:
          title: Name
          type: string
        value:
          title: Value
      required:
      - name
      - value
      title: CustomEvent
    DeveloperMessage:
      additionalProperties: true
      description: A developer message.
      example:
        role: developer
        encryptedValue: encryptedValue
        name: name
        id: id
        content: content
      properties:
        id:
          title: Id
          type: string
        role:
          default: developer
          enum:
          - developer
          title: Role
          type: string
        content:
          title: Content
          type: string
        name:
          nullable: true
          type: string
        encryptedValue:
          nullable: true
          type: string
      required:
      - content
      - id
      title: DeveloperMessage
    DocumentInputContent:
      additionalProperties: true
      description: A document input content fragment.
