    QueryRagQueryByTextRequest:
      description: DTO for querying RAG embeddings by text.
      example:
        hybrid_search_bm25_top_k: 602
        hybrid_search_semantic_top_k: 146
        top_k: 8
        hybrid_search_bm25_lang: simple
        filters:
          file_metadata_filters:
            key: File_Metadata_Filters_value
        query_text: query_text
        hybrid_search: false
      properties:
        query_text:
          title: Query Text
          type: string
        top_k:
          default: 5
          exclusiveMinimum: true
          maximum: 100.0
          minimum: 0.0
          title: Top K
          type: integer
        filters:
          $ref: "#/components/schemas/Filters"
        hybrid_search:
          default: false
          description: "Whether to perform a hybrid search that combines vector similarity\
            \ and BM25 text search. If true, the service will first use BM25 + semantic\
            \ search to filter candidates and then rerank them using vector similarity."
          title: Hybrid Search
          type: boolean
        hybrid_search_bm25_top_k:
          default: 5
          description: "When hybrid_search is true, this parameter controls the number\
            \ of top candidates to retrieve using BM25 before reranking with vector\
            \ similarity. A higher value may improve recall but increase latency."
          exclusiveMinimum: true
          maximum: 1000.0
          minimum: 0.0
          title: Hybrid Search Bm25 Top K
          type: integer
        hybrid_search_semantic_top_k:
          default: 5
          description: "When hybrid_search is true, this parameter controls the number\
            \ of top candidates to retrieve using semantic search before reranking\
            \ with vector similarity. A higher value may improve recall but increase\
            \ latency."
          exclusiveMinimum: true
          maximum: 1000.0
          minimum: 0.0
          title: Hybrid Search Semantic Top K
          type: integer
        hybrid_search_bm25_lang:
          default: simple
          description: "When hybrid_search is true, this parameter specifies the language\
            \ to use for BM25 search. This can affect tokenization and stopword removal,\
            \ which in turn can impact search results. The default 'simple' option\
            \ applies basic tokenization and is suitable for many languages, but you\
            \ may want to specify a particular language for better results with certain\
            \ languages."
          title: Hybrid Search Bm25 Lang
          type: string
      required:
      - query_text
      title: QueryRagQueryByTextRequest
